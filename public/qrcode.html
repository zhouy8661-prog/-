<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>手机扫码访问作品集</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0f172a;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 24px;
    }
    .container {
      background: #1e293b;
      border-radius: 20px;
      padding: 48px;
      text-align: center;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }
    .title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 32px;
    }
    #qrcode {
      display: inline-block;
      padding: 16px;
      background: #fff;
      border-radius: 12px;
      margin-bottom: 24px;
    }
    .url-row {
      margin-bottom: 16px;
    }
    .url-label {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .url {
      font-size: 15px;
      font-weight: 600;
      color: #38bdf8;
      word-break: break-all;
      padding: 10px 18px;
      background: #0f172a;
      border-radius: 8px;
    }
    .url-row:last-of-type {
      margin-bottom: 24px;
    }
    .tip {
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.6;
    }
    .tip span {
      color: #fbbf24;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">作品集 · 扫码访问</div>
    <div class="subtitle">请确保手机和电脑连接同一个 WiFi</div>
    <div id="qrcode"></div>
    <div class="url-row">
      <div class="url-label">📱 手机扫码</div>
      <div class="url">http://192.168.100.36:3000</div>
    </div>
    <div class="url-row">
      <div class="url-label">💻 电脑打开</div>
      <div class="url">http://localhost:3000</div>
    </div>
    <div class="tip">
      用手机相机或微信扫码即可打开<br>
      ⚠️ 如果手机打不开，请确认 <span>Windows 防火墙已放行端口 3000</span>
    </div>
  </div>
  <script>
    new QRCode(document.getElementById("qrcode"), {
      text: "http://192.168.100.36:3000",
      width: 240,
      height: 240,
      colorDark: "#0f172a",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
